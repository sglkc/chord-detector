<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CQT WASM Test</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      background: #0a0a0a;
      color: #e0e0e0;
    }

    h1 {
      color: #fff;
      margin-bottom: 1.5rem;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .input-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    label {
      color: #aaa;
    }

    input[type="number"] {
      padding: 0.5rem;
      width: 100px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
    }

    #output {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1rem;
      font-family: 'Monaco', 'Consolas', monospace;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto;
    }

    #canvas-container {
      margin-top: 1.5rem;
    }

    canvas {
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      width: 100%;
      height: auto;
      image-rendering: pixelated;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .stat-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #667eea;
    }

    .stat-label {
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.25rem;
    }
  </style>
</head>

<body>
  <h1>🎵 CQT WebAssembly Test</h1>

  <div class="controls">
    <div class="input-group">
      <label for="frequency">Frequency (Hz):</label>
      <input type="number" id="frequency" value="261.63" min="50" max="2000" step="0.01">
    </div>
    <div class="input-group">
      <label for="duration">Duration (s):</label>
      <input type="number" id="duration" value="1.0" min="0.1" max="5" step="0.1">
    </div>
    <button id="runTest">Run CQT Test</button>
    <button id="benchmark">Benchmark (100x)</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-value" id="extractTime">-</div>
      <div class="stat-label">Extraction Time</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="numBins">-</div>
      <div class="stat-label">Frequency Bins</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="numFrames">-</div>
      <div class="stat-label">Time Frames</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="wasmSize">-</div>
      <div class="stat-label">WASM Size</div>
    </div>
  </div>

  <div id="canvas-container">
    <canvas id="cqtCanvas" width="800" height="288"></canvas>
  </div>

  <h2 style="margin-top: 2rem;">Console Output</h2>
  <pre id="output">Click "Run CQT Test" to start...</pre>

  <script type="module">
    import { CQTExtractor } from './index.js';

    const output = document.getElementById('output');
    const canvas = document.getElementById('cqtCanvas');
    const ctx = canvas.getContext('2d');

    // Override console.log to capture output
    const originalLog = console.log;
    const logs = [];
    console.log = (...args) => {
      originalLog(...args);
      logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
      output.textContent = logs.slice(-50).join('\n');
      output.scrollTop = output.scrollHeight;
    };

    // Generate test audio signal
    function generateTestSignal(sampleRate, duration, frequency) {
      const numSamples = Math.floor(sampleRate * duration);
      const signal = new Float32Array(numSamples);

      for (let i = 0; i < numSamples; i++) {
        const t = i / sampleRate;
        signal[i] = 0.5 * Math.sin(2 * Math.PI * frequency * t);
        signal[i] += 0.3 * Math.sin(2 * Math.PI * frequency * 2 * t);
        signal[i] += 0.15 * Math.sin(2 * Math.PI * frequency * 3 * t);
        signal[i] += 0.1 * Math.sin(2 * Math.PI * frequency * 4 * t);
      }

      return signal;
    }

    // Viridis colormap
    function viridisColor(value) {
      const v = Math.max(0, Math.min(1, value));
      const r = Math.round(255 * (0.267004 + v * (0.329415 + v * (-0.508378 + v * 1.137680))));
      const g = Math.round(255 * (0.004874 + v * (0.873158 + v * (-0.058404 + v * -0.322897))));
      const b = Math.round(255 * (0.329415 + v * (0.280197 + v * (-1.314181 + v * 1.171356))));
      return [Math.max(0, Math.min(255, r)), Math.max(0, Math.min(255, g)), Math.max(0, Math.min(255, b))];
    }

    // Draw CQT spectrogram
    function drawCQT(magnitudes, numBins, numFrames) {
      canvas.width = numFrames;
      canvas.height = numBins;

      const imageData = ctx.createImageData(numFrames, numBins);

      // Find min/max
      let min = Infinity, max = -Infinity;
      for (let t = 0; t < numFrames; t++) {
        for (let b = 0; b < numBins; b++) {
          const val = magnitudes[t][b];
          if (val < min) min = val;
          if (val > max) max = val;
        }
      }
      const range = max - min || 1;

      for (let t = 0; t < numFrames; t++) {
        for (let b = 0; b < numBins; b++) {
          const val = (magnitudes[t][b] - min) / range;
          const idx = ((numBins - 1 - b) * numFrames + t) * 4;
          const [r, g, bl] = viridisColor(val);
          imageData.data[idx] = r;
          imageData.data[idx + 1] = g;
          imageData.data[idx + 2] = bl;
          imageData.data[idx + 3] = 255;
        }
      }

      ctx.putImageData(imageData, 0, 0);
    }

    const cqt = new CQTExtractor();

    // Get WASM size
    fetch('./build/release.wasm')
      .then(r => r.arrayBuffer())
      .then(buf => {
        document.getElementById('wasmSize').textContent = (buf.byteLength / 1024).toFixed(1) + ' KB';
      });

    document.getElementById('runTest').addEventListener('click', async () => {
      logs.length = 0;

      const frequency = parseFloat(document.getElementById('frequency').value);
      const duration = parseFloat(document.getElementById('duration').value);

      console.log(`Generating ${frequency} Hz signal for ${duration}s...`);

      const config = {
        audio: { sampleRate: 48000, minFrequency: 130.81, hopSize: 512 },
        classification: { cqtBins: 36, cqtTimeFrames: 87 }
      };

      const audioData = generateTestSignal(config.audio.sampleRate, duration, frequency);

      const startTime = performance.now();
      const features = await cqt.extractFeatures(audioData, config);
      const extractTime = performance.now() - startTime;

      document.getElementById('extractTime').textContent = extractTime.toFixed(2) + 'ms';
      document.getElementById('numBins').textContent = config.classification.cqtBins;
      document.getElementById('numFrames').textContent = config.classification.cqtTimeFrames;

      // Full CQT for visualization
      const fullCQT = cqt.extractFullCQT(audioData);
      drawCQT(fullCQT.magnitudes, fullCQT.numBins, fullCQT.numFrames);

      console.log(`\n✓ Test completed!`);
    });

    document.getElementById('benchmark').addEventListener('click', async () => {
      const btn = document.getElementById('benchmark');
      btn.disabled = true;
      btn.textContent = 'Running...';

      logs.length = 0;
      console.log('Running benchmark (100 iterations)...\n');

      const config = {
        audio: { sampleRate: 48000, minFrequency: 130.81, hopSize: 512 },
        classification: { cqtBins: 36, cqtTimeFrames: 87 }
      };

      const audioData = generateTestSignal(config.audio.sampleRate, 1.0, 261.63);

      // Warmup
      await cqt.extractFeatures(audioData, config);

      const times = [];
      for (let i = 0; i < 100; i++) {
        const start = performance.now();
        await cqt.extractFeatures(audioData, config);
        times.push(performance.now() - start);
      }

      const avg = times.reduce((a, b) => a + b, 0) / times.length;
      const min = Math.min(...times);
      const max = Math.max(...times);
      const sorted = [...times].sort((a, b) => a - b);
      const p50 = sorted[49];
      const p95 = sorted[94];

      console.log('Benchmark Results:');
      console.log(`  Average: ${avg.toFixed(2)}ms`);
      console.log(`  Min: ${min.toFixed(2)}ms`);
      console.log(`  Max: ${max.toFixed(2)}ms`);
      console.log(`  P50: ${p50.toFixed(2)}ms`);
      console.log(`  P95: ${p95.toFixed(2)}ms`);
      console.log(`  Throughput: ${(1000 / avg).toFixed(1)} extractions/sec`);

      document.getElementById('extractTime').textContent = avg.toFixed(2) + 'ms (avg)';

      btn.disabled = false;
      btn.textContent = 'Benchmark (100x)';
    });
  </script>
</body>

</html>
